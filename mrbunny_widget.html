<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>*{box-sizing:border-box;margin:0;padding:0;}body{background:transparent;overflow:hidden;}</style>
</head>
<body>
<script>
(function() {
  var doc = window.parent.document;
  if (doc.getElementById('mrbunny-fab')) return;

  // --- CONFIGURATION ---
  var OPENROUTER_KEY = __OPENROUTER_API_KEY__; 
  // ---------------------

  var CATALOGUE = [
    "- Map styles: OpenStreetMap, CartoDB Dark, CartoDB Light, Stadia Terrain, and Satellite (Esri)",
    "- It can check Traffic around the Area",
    "- It can get Directions to places from places.",
    "- It can search locations.",
    "- It can find your location.",
    "- MrBunny AI logo is 🐰, and the Nova Maps logo is 🗺️!",
  ].join("\n");

  var SYS = "You are MrBunny, an AI assistant made by Koushik Tummepalli for Nova Maps. Help people use Nova Maps, search for places, understand locations, get directions, check traffic, and learn basic history or context about places. Stay focused on maps, navigation, geography, and location help. Be warm, concise, and practical. Nova Maps features:\n\n" + CATALOGUE + "\n\nYour solo website is https://mrbunnyai-v2.streamlit.app/. Answer directly and clearly in English, unless the user requests a different langauge. Keep your answers accurate and do not invent anything. Keep your answers short. Do NOT in any case not be un family friendly. ALWAYS be PG! Good luck!";

  var st = doc.createElement('style');
  st.textContent =
    '#mrbunny-fab{position:fixed;bottom:24px;right:24px;width:54px;height:54px;background:#0d0d0d;border-radius:50%;border:2px solid #2a2a2a;font-size:1.45rem;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:2147483647;transition:transform .15s;user-select:none;}' +
    '#mrbunny-fab:hover{transform:scale(1.1);}' +
    '#mrbunny-panel{position:fixed;bottom:90px;right:24px;width:320px;height:430px;background:#0d0d0d;border:1px solid #222;border-radius:6px;box-shadow:0 10px 44px rgba(0,0,0,.9);z-index:2147483646;display:none;flex-direction:column;overflow:hidden;font-family:"DM Sans","Segoe UI",sans-serif;}' +
    '#mrbunny-panel.bopen{display:flex;}' +
    '#bhdr{background:#111;padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1a1a1a;flex-shrink:0;}' +
    '#bav{width:32px;height:32px;background:#1a1a1a;border-radius:50%;border:1px solid #2e2e2e;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}' +
    '#bhtx{flex:1;}#btitle{color:#f0f0f0;font-weight:700;font-size:.88rem;}#bsub{color:#444;font-size:.65rem;margin-top:1px;}' +
    '#bdot{width:7px;height:7px;background:#3ecf8e;border-radius:50%;}' +
    '#bmsgs{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:8px;background:#0d0d0d;}' +
    '#bmsgs::-webkit-scrollbar{width:3px;}#bmsgs::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}' +
    '.bwb{display:flex;flex-direction:column;align-items:flex-start;}.bwu{display:flex;flex-direction:column;align-items:flex-end;}' +
    '.blb{font-size:.6rem;color:#333;margin-bottom:2px;}.blu{font-size:.6rem;color:#7a6020;margin-bottom:2px;}' +
    '.bbot{background:#161616;color:#ccc;border:1px solid #1f1f1f;border-radius:2px 10px 10px 10px;padding:8px 11px;font-size:.8rem;line-height:1.55;max-width:93%;}' +
    '.busr{background:#C4973B;color:#0d0d0d;border-radius:10px 2px 10px 10px;padding:8px 11px;font-size:.8rem;line-height:1.55;max-width:93%;font-weight:600;}' +
    '.btyp{color:#333;font-size:.75rem;font-style:italic;padding:2px;}' +
    '#bbar{display:flex;border-top:1px solid #1a1a1a;background:#111;flex-shrink:0;}' +
    '#binp{flex:1;background:transparent;border:none;outline:none;color:#ddd;font-size:.82rem;padding:11px 12px;font-family:inherit;}' +
    '#binp::placeholder{color:#333;}' +
    '#bbtn{background:#C4973B;border:none;color:#0d0d0d;font-weight:700;font-size:.9rem;padding:0 16px;cursor:pointer;transition:background .15s;}' +
    '#bbtn:hover{background:#d4a84b;}#bbtn:disabled{background:#222;color:#444;cursor:not-allowed;}';
  doc.head.appendChild(st);

  var fab = doc.createElement('div');
  fab.id = 'mrbunny-fab';
  fab.textContent = '\uD83D\uDC30';
  doc.body.appendChild(fab);

  var panel = doc.createElement('div'); panel.id = 'mrbunny-panel';
  var hdr = doc.createElement('div'); hdr.id = 'bhdr';
  hdr.innerHTML = '<div id="bav">\uD83D\uDC30</div><div id="bhtx"><div id="btitle">MrBunny AI</div><div id="bsub">Your Maps Navigator</div></div><div id="bdot"></div>';
  var msgs = doc.createElement('div'); msgs.id = 'bmsgs';
  var welcome = doc.createElement('div'); welcome.className = 'bwb';
  welcome.innerHTML = '<div class="blb">MrBunny</div><div class="bbot">Hey! \uD83D\uDC30 I\'m MrBunny, your Nova Maps assistant. Ask me about places, directions, traffic, map styles, or what you can do here.</div>';
  msgs.appendChild(welcome);
  var bar = doc.createElement('div'); bar.id = 'bbar';
  var inp = doc.createElement('input'); inp.id='binp'; inp.type='text'; inp.placeholder='Ask MrBunny anything\u2026';
  var btn = doc.createElement('button'); btn.id='bbtn'; btn.textContent='\u27A4';
  bar.appendChild(inp); bar.appendChild(btn);
  panel.appendChild(hdr); panel.appendChild(msgs); panel.appendChild(bar);
  doc.body.appendChild(panel);

  fab.addEventListener('click', function() {
    panel.classList.toggle('bopen');
    if (panel.classList.contains('bopen')) inp.focus();
  });

  var hist = [];
  var MODELS = [
    'openai/gpt-oss-120b:free',
    'openai/gpt-oss-20b:free',
    'google/gemma-3-27b-it:free',
    'meta-llama/llama-3.3-8b-instruct:free'
  ];
  function scrollBot() { msgs.scrollTop = msgs.scrollHeight; }

  function mkBubble(role, text) {
    var w=doc.createElement('div'); w.className=role==='user'?'bwu':'bwb';
    var l=doc.createElement('div'); l.className=role==='user'?'blu':'blb'; l.textContent=role==='user'?'You':'MrBunny';
    var b=doc.createElement('div'); b.className=role==='user'?'busr':'bbot'; b.textContent=text;
    w.appendChild(l); w.appendChild(b); msgs.appendChild(w); scrollBot();
  }

  function setTyping(on) {
    var t=doc.getElementById('btyp');
    if(on&&!t){var e=doc.createElement('div');e.id='btyp';e.className='btyp';e.textContent='MrBunny is thinking\u2026';msgs.appendChild(e);scrollBot();}
    else if(!on&&t){t.remove();}
  }

  function localAnswer(text) {
    var q = text.toLowerCase();
    if (q.includes('who made you') || q.includes('who created you') || q.includes('who built you')) {
      return 'Koushik Tummepalli made me for Nova Maps. I help with places, directions, traffic, map styles, and location questions. \uD83D\uDC30';
    }
    return null;
  }

  async function callOpenRouter(messages) {
    var lastErr = 'OpenRouter request failed';

    for (var i = 0; i < MODELS.length; i++) {
      var model = MODELS[i];
      var res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + OPENROUTER_KEY,
          'HTTP-Referer': window.location.href,
          'X-Title': 'MrBunny'
        },
        body: JSON.stringify({
          model: model,
          messages: messages
        })
      });

      var data = await res.json().catch(function(){ return {}; });
      if (res.ok && data.choices && data.choices[0] && data.choices[0].message) {
        return data.choices[0].message.content;
      }

      lastErr = (data && data.error && (data.error.message || data.error.code)) || res.statusText || lastErr;
      console.warn('MrBunny model failed:', model, lastErr);
    }

    throw new Error(lastErr);
  }

  async function send() {
    var text = inp.value.trim(); if(!text) return;
    inp.value=''; inp.disabled=true; btn.disabled=true;
    mkBubble('user', text); 

    var localReply = localAnswer(text);
    if (localReply) {
      mkBubble('assistant', localReply);
      hist.push({role: 'user', content: text});
      hist.push({role: 'assistant', content: localReply});
      inp.disabled=false; btn.disabled=false; inp.focus();
      return;
    }
    
    // Convert history for OpenRouter format
    var messages = [{role: 'system', content: SYS}];
    hist.forEach(h => messages.push({role: h.role, content: h.content}));
    messages.push({role: 'user', content: text});
    
    setTyping(true);

    try {
      if (!OPENROUTER_KEY || OPENROUTER_KEY === "[API_KEY]") {
        setTyping(false);
        mkBubble('assistant', 'MrBunny needs an OPENROUTER_API_KEY secret before I can answer live chat requests.');
        return;
      }

      var reply = await callOpenRouter(messages);
      setTyping(false);
      mkBubble('assistant', reply);
      hist.push({role: 'user', content: text});
      hist.push({role: 'assistant', content: reply});
    } catch(e) {
      setTyping(false);
      mkBubble('assistant', 'OpenRouter is having trouble right now: ' + (e.message || 'unknown error') + '. Try again in a moment. \uD83D\uDC30');
      console.error(e);
    }
    inp.disabled=false; btn.disabled=false; inp.focus();
  }

  btn.addEventListener('click', send);
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') send(); });
})();
</script>
</body>
</html>
